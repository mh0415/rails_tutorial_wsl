services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && rails s -b 0.0.0.0"
    volumes:
      - ./src:/app
      - bundle:/usr/local/bundle   # ←🔥これ
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  bundle:        # ←🔥これが無いと今回のエラー
  mysql_data:
